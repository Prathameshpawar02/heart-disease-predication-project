# Configuration file for Heart Disease Prediction System

[API]
HOST = 0.0.0.0
PORT = 5000
DEBUG = True
CORS_ORIGINS = *

[MODEL]
MODEL_PATH = ../models/heart_disease_model.pkl
FEATURES_PATH = ../models/features.pkl
DATA_PATH = ../heart.csv

[PREDICTION]
CONFIDENCE_THRESHOLD = 0.5
INCLUDE_PROBABILITIES = True

[FRONTEND]
API_URL = http://localhost:5000
TIMEOUT_MS = 30000

[DATA_VALIDATION]
AGE_MIN = 0
AGE_MAX = 120
CHOLESTEROL_MIN = 0
CHOLESTEROL_MAX = 600
HEART_RATE_MIN = 0
HEART_RATE_MAX = 220
BLOOD_PRESSURE_MIN = 0
BLOOD_PRESSURE_MAX = 300
